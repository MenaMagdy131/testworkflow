name: RunPythonScript

on: [push]

jobs:
  print-welcome-msg:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: List
      run: ls -alh

    - name: SetupPython
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    - name: CheckPythonVersion
      run: python --version
    
    - name: Run script
      run: python app.py